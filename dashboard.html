<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felicity Battery Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2d3248;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --purple:  #a78bfa;
      --orange:  #f97316;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 1.25rem;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--green); }

    .health-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .health-dot.ok    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .health-dot.error { background: var(--red);   box-shadow: 0 0 6px var(--red);   }

    /* ── Error banner ─────────────────────────────────────── */
    #errorBanner {
      display: none;
      background: #2a1a1a;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 0.625rem 1rem;
      font-size: 0.8125rem;
      color: var(--red);
      margin-bottom: 1rem;
    }

    /* ── Status cards ─────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
      gap: 0.875rem;
      margin-bottom: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.125rem;
    }

    .card-label {
      font-size: 0.6875rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.5rem;
    }

    .card-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .card-unit {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--muted);
      margin-left: 0.2rem;
    }

    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
      min-height: 1em;
    }

    /* ── Controls ─────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      margin-bottom: 1.125rem;
      flex-wrap: wrap;
    }

    .controls-label {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-right: 0.25rem;
    }

    .range-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3125rem 0.6875rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8125rem;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .range-btn:hover {
      border-color: var(--blue);
      color: var(--text);
    }

    .range-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .refresh-info {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
    }

    #lastUpdated {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: 0.5rem;
    }

    /* ── Charts grid ──────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 0.875rem;
      margin-bottom: 0.875rem;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.125rem;
    }

    .chart-title {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .chart-wrap {
      position: relative;
      height: 200px;
    }

    /* ── Cell voltages card ───────────────────────────────── */
    .cells-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.125rem;
      margin-bottom: 1rem;
    }

    .cells-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.75rem;
    }

    .cells-title { font-size: 0.8125rem; color: var(--muted); }
    .cells-imbalance { font-size: 0.75rem; color: var(--muted); }

    .cell-wrap {
      position: relative;
      height: 140px;
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 0.6875rem;
      color: var(--muted);
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <h1>Felicity <span>Battery</span></h1>
  <div class="health-badge">
    <div class="health-dot" id="healthDot"></div>
    <span id="healthLabel">—</span>
  </div>
</header>

<div id="errorBanner"></div>

<div class="cards">
  <div class="card">
    <div class="card-label">State of Charge</div>
    <div class="card-value" id="cardSOC">—<span class="card-unit">%</span></div>
    <div class="card-sub" id="cardSOCSub"></div>
  </div>
  <div class="card">
    <div class="card-label">Power</div>
    <div class="card-value" id="cardPower">—<span class="card-unit">W</span></div>
    <div class="card-sub" id="cardPowerSub"></div>
  </div>
  <div class="card">
    <div class="card-label">Voltage</div>
    <div class="card-value" id="cardVolt" style="color:var(--blue)">—<span class="card-unit">V</span></div>
    <div class="card-sub" id="cardVoltSub"></div>
  </div>
  <div class="card">
    <div class="card-label">Temperature</div>
    <div class="card-value" id="cardTemp" style="color:var(--blue)">—<span class="card-unit">°C</span></div>
    <div class="card-sub" id="cardTempSub"></div>
  </div>
</div>

<div class="controls">
  <span class="controls-label">Range:</span>
  <button class="range-btn" data-range="1h">1h</button>
  <button class="range-btn active" data-range="24h">24h</button>
  <button class="range-btn" data-range="7d">7d</button>
  <button class="range-btn" data-range="30d">30d</button>
  <span id="lastUpdated"></span>
  <div class="refresh-info">Auto-refresh in <span id="countdown">5:00</span></div>
</div>

<div class="charts-grid">
  <div class="chart-card">
    <div class="chart-title">State of Charge (%)</div>
    <div class="chart-wrap"><canvas id="chartSOC"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Power (W) — positive = charging</div>
    <div class="chart-wrap"><canvas id="chartPower"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Voltage (V)</div>
    <div class="chart-wrap"><canvas id="chartVolt"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Temperature (°C)</div>
    <div class="chart-wrap"><canvas id="chartTemp"></canvas></div>
  </div>
</div>

<div class="cells-card">
  <div class="cells-header">
    <div class="cells-title">Cell Voltages — latest reading (mV)</div>
    <div class="cells-imbalance" id="cellImbalance"></div>
  </div>
  <div class="cell-wrap"><canvas id="chartCells"></canvas></div>
</div>

<footer>FAL24171-EU · 24V 171Ah LiFePO₄ · data every 5 min</footer>

<script>
  'use strict';

  const BASE = window.location.origin;

  const RANGE_LIMITS = {
    '1h':  12,
    '24h': 288,
    '7d':  2016,
    '30d': 8640,
  };

  let activeRange = '24h';
  const charts = {};
  let countdownSec = 300;
  let countdownTimer = null;

  // ── Chart.js global defaults ────────────────────────────
  Chart.defaults.color = '#64748b';
  Chart.defaults.borderColor = '#2d3248';
  Chart.defaults.font.family = "system-ui, -apple-system, 'Segoe UI', sans-serif";

  const GRID_COLOR = '#1e2235';

  function baseLineOpts() {
    return {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2d3248',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
        },
      },
      scales: {
        x: {
          ticks: { maxTicksLimit: 6, maxRotation: 0 },
          grid: { color: GRID_COLOR },
        },
        y: {
          grid: { color: GRID_COLOR },
        },
      },
    };
  }

  // ── Helpers ─────────────────────────────────────────────
  function socColor(soc) {
    if (soc < 20) return '#ef4444';
    if (soc < 50) return '#eab308';
    return '#22c55e';
  }

  function tempColor(t) {
    if (t > 40) return '#ef4444';
    if (t > 30) return '#eab308';
    return '#3b82f6';
  }

  function cellColor(mv) {
    if (mv < 3000) return '#ef4444';
    if (mv < 3200) return '#eab308';
    return '#22c55e';
  }

  function fmtTs(ts, range) {
    const d = new Date(ts);
    if (range === '1h' || range === '24h') {
      return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function fmtNow() {
    return new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  // ── Health ──────────────────────────────────────────────
  async function fetchHealth() {
    try {
      const res = await fetch(`${BASE}/api/health`);
      const d = await res.json();
      const dot   = document.getElementById('healthDot');
      const label = document.getElementById('healthLabel');
      if (d.ok) {
        dot.className = 'health-dot ok';
        label.textContent = 'Live';
        showError('');
      } else if (!d.last_poll) {
        dot.className = 'health-dot';
        label.textContent = 'Connecting…';
      } else {
        dot.className = 'health-dot error';
        label.textContent = 'Stale';
        showError(d.last_error || 'Data is stale — check the service.');
      }
    } catch {
      document.getElementById('healthDot').className = 'health-dot error';
      document.getElementById('healthLabel').textContent = 'Unreachable';
      showError('Cannot reach the API — is the service running?');
    }
  }

  // ── Status cards ────────────────────────────────────────
  async function fetchStatus() {
    try {
      const res = await fetch(`${BASE}/api/status`);
      if (!res.ok) return;
      const rec = await res.json();
      updateCards(rec);
    } catch { /* silent */ }
  }

  function updateCards(rec) {
    const soc = rec.soc;

    // SOC
    const sc = socColor(soc);
    document.getElementById('cardSOC').innerHTML =
      `<span style="color:${sc}">${soc.toFixed(0)}</span><span class="card-unit">%</span>`;
    const socSub = document.getElementById('cardSOCSub');
    if (rec.hours_left != null) {
      socSub.textContent = `Empty in ~${rec.hours_left.toFixed(1)} h`;
    } else if (rec.hours_to_full != null) {
      socSub.textContent = `Full in ~${rec.hours_to_full.toFixed(1)} h`;
    } else {
      socSub.textContent = `SOH ${rec.soh}%`;
    }

    // Power
    const pw = rec.power_w;
    const isCharging = pw > 1;
    const isIdle = Math.abs(pw) <= 1;
    const pwColor = isCharging ? '#22c55e' : isIdle ? '#64748b' : '#eab308';
    const pwSign  = isCharging ? '↑ Charging' : isIdle ? 'Idle' : '↓ Discharging';
    document.getElementById('cardPower').innerHTML =
      `<span style="color:${pwColor}">${Math.abs(pw).toFixed(0)}</span><span class="card-unit">W</span>`;
    document.getElementById('cardPowerSub').textContent = pwSign;

    // Voltage
    document.getElementById('cardVolt').innerHTML =
      `${rec.volt_v.toFixed(2)}<span class="card-unit">V</span>`;
    const ca = rec.curr_a;
    document.getElementById('cardVoltSub').textContent =
      `${ca > 0 ? '+' : ''}${ca.toFixed(1)} A`;

    // Temperature
    const tc = tempColor(rec.temp_max_c);
    document.getElementById('cardTemp').innerHTML =
      `<span style="color:${tc}">${rec.temp_max_c.toFixed(0)}</span><span class="card-unit">°C</span>`;
    document.getElementById('cardTempSub').textContent =
      rec.temp_max_c !== rec.temp_min_c
        ? `Min ${rec.temp_min_c.toFixed(0)}°C`
        : 'Uniform';

    // Cell voltages
    if (rec.cell_volts_mv && rec.cell_volts_mv.length > 0) {
      updateCellChart(rec.cell_volts_mv);
    }
  }

  // ── History + charts ────────────────────────────────────
  async function fetchHistory(range) {
    const limit = RANGE_LIMITS[range];
    try {
      const res = await fetch(`${BASE}/api/history?limit=${limit}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { records } = await res.json();
      return records || [];
    } catch {
      return [];
    }
  }

  // ── Chart init ──────────────────────────────────────────
  function initCharts() {
    // SOC
    charts.soc = new Chart(document.getElementById('chartSOC'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'SOC %',
          data: [],
          borderColor: '#22c55e',
          backgroundColor: '#22c55e18',
          fill: true,
          pointRadius: 0,
          tension: 0.3,
        }],
      },
      options: {
        ...baseLineOpts(),
        scales: {
          ...baseLineOpts().scales,
          y: { ...baseLineOpts().scales.y, min: 0, max: 100,
            ticks: { callback: v => v + '%' } },
        },
      },
    });

    // Power — colour segments by sign
    charts.power = new Chart(document.getElementById('chartPower'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Power W',
          data: [],
          borderColor: '#3b82f6',
          backgroundColor: '#3b82f610',
          fill: 'origin',
          pointRadius: 0,
          tension: 0.3,
          segment: {
            borderColor: ctx =>
              ctx.p0.parsed.y >= 0 ? '#22c55e' : '#f97316',
            backgroundColor: ctx =>
              ctx.p0.parsed.y >= 0 ? '#22c55e18' : '#f9731618',
          },
        }],
      },
      options: {
        ...baseLineOpts(),
        plugins: {
          ...baseLineOpts().plugins,
          tooltip: {
            ...baseLineOpts().plugins.tooltip,
            callbacks: {
              label: ctx => `${ctx.parsed.y > 0 ? '↑ ' : '↓ '}${Math.abs(ctx.parsed.y).toFixed(0)} W`,
            },
          },
        },
      },
    });

    // Voltage
    charts.volt = new Chart(document.getElementById('chartVolt'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Voltage V',
          data: [],
          borderColor: '#a78bfa',
          backgroundColor: '#a78bfa18',
          fill: true,
          pointRadius: 0,
          tension: 0.3,
        }],
      },
      options: {
        ...baseLineOpts(),
        scales: {
          ...baseLineOpts().scales,
          y: { ...baseLineOpts().scales.y,
            ticks: { callback: v => v.toFixed(2) + ' V' } },
        },
      },
    });

    // Temperature — max + min bands
    charts.temp = new Chart(document.getElementById('chartTemp'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Max °C',
            data: [],
            borderColor: '#f97316',
            backgroundColor: '#f9731620',
            fill: '+1',
            pointRadius: 0,
            tension: 0.3,
          },
          {
            label: 'Min °C',
            data: [],
            borderColor: '#fbbf24',
            backgroundColor: '#fbbf2410',
            fill: false,
            pointRadius: 0,
            tension: 0.3,
          },
        ],
      },
      options: {
        ...baseLineOpts(),
        plugins: {
          ...baseLineOpts().plugins,
          legend: { display: true, labels: { boxWidth: 10, font: { size: 11 } } },
        },
        scales: {
          ...baseLineOpts().scales,
          y: { ...baseLineOpts().scales.y,
            ticks: { callback: v => v + '°C' } },
        },
      },
    });

    // Cell voltages bar
    charts.cells = new Chart(document.getElementById('chartCells'), {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: 'mV',
          data: [],
          backgroundColor: [],
          borderRadius: 4,
          borderSkipped: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1d27',
            borderColor: '#2d3248',
            borderWidth: 1,
            titleColor: '#94a3b8',
            bodyColor: '#e2e8f0',
            callbacks: {
              label: ctx => `${ctx.parsed.y} mV`,
            },
          },
        },
        scales: {
          x: { grid: { color: GRID_COLOR } },
          y: {
            min: 3000,
            grid: { color: GRID_COLOR },
            ticks: { callback: v => v + ' mV' },
          },
        },
      },
    });
  }

  // ── Chart updates ───────────────────────────────────────
  function updateCharts(records, range) {
    // API returns newest-first → reverse to get oldest-first for display
    const asc = [...records].reverse();
    const labels = asc.map(r => fmtTs(r.ts, range));

    charts.soc.data.labels = labels;
    charts.soc.data.datasets[0].data = asc.map(r => r.soc);
    charts.soc.update('none');

    charts.power.data.labels = labels;
    charts.power.data.datasets[0].data = asc.map(r => r.power_w);
    charts.power.update('none');

    charts.volt.data.labels = labels;
    charts.volt.data.datasets[0].data = asc.map(r => r.volt_v);
    charts.volt.update('none');

    charts.temp.data.labels = labels;
    charts.temp.data.datasets[0].data = asc.map(r => r.temp_max_c);
    charts.temp.data.datasets[1].data = asc.map(r => r.temp_min_c);
    charts.temp.update('none');
  }

  function updateCellChart(cellMv) {
    const min = Math.min(...cellMv);
    const max = Math.max(...cellMv);
    const imbalance = max - min;

    document.getElementById('cellImbalance').textContent =
      `Imbalance: ${imbalance} mV` +
      (imbalance > 50 ? ' ⚠ critical' : imbalance > 20 ? ' ⚡ attention' : ' ✓ ok');

    charts.cells.data.labels = cellMv.map((_, i) => `C${i + 1}`);
    charts.cells.data.datasets[0].data = cellMv;
    charts.cells.data.datasets[0].backgroundColor = cellMv.map(cellColor);
    charts.cells.update('none');
  }

  // ── Load everything ─────────────────────────────────────
  async function loadAll(range) {
    await Promise.all([
      fetchHealth(),
      fetchStatus(),
      fetchHistory(range).then(records => {
        if (records.length > 0) updateCharts(records, range);
      }),
    ]);
    document.getElementById('lastUpdated').textContent = `Updated ${fmtNow()}`;
  }

  // ── Range buttons ───────────────────────────────────────
  function setRange(range) {
    activeRange = range;
    document.querySelectorAll('.range-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.range === range)
    );
    loadAll(range);
  }

  // ── Countdown ───────────────────────────────────────────
  function startCountdown() {
    countdownSec = 300;
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      countdownSec--;
      const m = Math.floor(countdownSec / 60);
      const s = countdownSec % 60;
      document.getElementById('countdown').textContent =
        `${m}:${String(s).padStart(2, '0')}`;
      if (countdownSec <= 0) {
        loadAll(activeRange);
        countdownSec = 300;
      }
    }, 1000);
  }

  // ── Boot ────────────────────────────────────────────────
  document.querySelectorAll('.range-btn').forEach(btn =>
    btn.addEventListener('click', () => setRange(btn.dataset.range))
  );

  initCharts();
  loadAll(activeRange);
  startCountdown();
</script>
</body>
</html>
